      statement: Repo artifacts are canonical and versioned first.
    - id: RULE-002
      statement: Vault receives promoted summary artifacts only.
    - id: RULE-003
      statement: Jira mirrors status and links to promoted summaries.
    - id: RULE-004
      statement: Promotion requires passing local validation and export generation.

