phase_id: PHASE1
canonical_artifact_home: repo

build_vs_run_boundary:
  id: BVR-001
  source_refs:
    - DHLCO2-4
    - DHLCO2-10
    - DHLCO2-11
    - "Offer para 43"
    - "Offer para 45"
    - "Offer para 46"
  build_in_scope:
    - CI/CD pipeline runs
    - Test environments
    - Build minutes per artifact
    - ML training in development
    - Embodied carbon amortization in development context
  build_out_of_scope:
    - Full hardware validation measurements (TBD future phase)
    - Non-DHL systems outside agreed telemetry boundary
  run_in_scope:
    - Inference and operational service requests
    - Data transfer in operation
    - Energy proportionality in operation
    - Region/time carbon-intensity weighting
  run_out_of_scope:
    - Business domains without mapped telemetry
    - Historical backfill before data owner assignment
  deployment_boundary:
    id: DEP-001
    decision_rule: Release and deploy activities are treated as run-adjacent unless executed only inside CI/CD.
    edge_cases:
      - id: EDGE-001
        case: Pre-production load test in CI
        assignment: build
        rationale: Executed inside pipeline and used to gate release quality.
      - id: EDGE-002
        case: Canary deployment in production
        assignment: run
        rationale: Uses production infrastructure and operational traffic.
      - id: EDGE-003
        case: Shared artifact registry traffic
        assignment: TBD
        rationale: Requires allocation policy across build and run consumers.

