# Cross-Repo Energy Benchmark — evidence ledger
#
# PURPOSE: Demonstrates that the SCI-based measurement methodology built for the
# DHLCO2 pilot is technology-independent and portable, not a one-off built around
# one project. Each entry is either a real, verified GitHub Actions Eco-CI result
# (status: measured) or a repo where the workflow was added and pushed but the run
# result hasn't been confirmed yet (status: awaiting_verification).
#
# NEVER invent numbers here. A "measured" entry must have a real captured value
# from an actual Eco-CI job summary. Update status + values by hand once each
# repo's Actions run is checked (see repo_url for where to look).
#
# Portfolio inventory (2026-07-15): scanned all folders under Projects/ (51 total).
# 9 already had GitHub Actions CI; of those, 7 are Krallmann/personal (not another
# client's repo) and were chosen for this benchmark. Two of the 9 (gv-* prefixed)
# belong to a different client engagement and were deliberately excluded. One more
# (Extract_Information) was deferred: its only CI workflows deploy directly to a
# live GKE cluster on every push to its default branch with no path filter, so
# adding a measurement step there risks triggering a real production deployment
# as a side effect — needs an explicit decision before touching it.

entries:
  - repo: dhlco2_co2_artifact
    repo_url: https://github.com/it-opsKAG/dhlco2_co2_artifact
    workflow: energy-ci.yml
    status: measured
    verified_at: "2026-07-14"
    sci_gco2eq_per_run: 0.006042
    total_energy_joules: 29.83
    avg_cpu_utilization_pct: 21.82
    carbon_intensity_gco2e_per_kwh: 472.0
    carbon_intensity_source: eco_ci_global_default
    notes: First real (not simulated) measurement in the project. Only setup-python
      and install-dependencies appear as separate rows; faster steps (checkout,
      pytest, export validation) likely fell under Eco-CI's measurable resolution.

