version: 1
rules:
  - id: ALW-001
    source_glob: "outputs/dhlco2_phase1/*/decisions.yaml"
    destination: "docs/decision_packs/{run_id}/decisions.yaml"
  - id: ALW-002
    source_glob: "outputs/dhlco2_phase1/*/decisions.md"
    destination: "docs/decision_packs/{run_id}/decisions.md"
  - id: ALW-003
    source_glob: "outputs/dhlco2_phase1/*/manifest.md"
    destination: "docs/decision_packs/{run_id}/manifest.md"
  - id: ALW-004
    source_glob: "outputs/dhlco2_phase1/*/slr/query_pack.yaml"
    destination: "docs/slr/{run_id}/query_pack.yaml"
  - id: ALW-005
    source_glob: "outputs/dhlco2_phase1/*/slr/inclusion_criteria.md"
    destination: "docs/slr/{run_id}/inclusion_criteria.md"
  - id: ALW-006
    source_glob: "outputs/dhlco2_phase1/*/slr/exclusion_criteria.md"
    destination: "docs/slr/{run_id}/exclusion_criteria.md"
  - id: ALW-007
    source_glob: "outputs/dhlco2_phase1/*/slr/evidence_ledger.yaml"
    destination: "docs/slr/{run_id}/evidence_ledger.yaml"
  - id: ALW-008
    source_glob: "outputs/dhlco2_phase1/*/slr/standards_map.md"
    destination: "docs/slr/{run_id}/standards_map.md"
