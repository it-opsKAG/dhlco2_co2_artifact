assumptions:
  - id: ASM-001
    topic: SCI baseline
    statement: All KPI candidates use SCI baseline formula ((E * I) + M) / R.
    source_refs:
      - DHLCO2-4
      - "Offer para 44"
  - id: ASM-002
    topic: Build versus run split
    statement: Build and run emissions are separated as required by the offer.
    source_refs:
      - DHLCO2-4
      - DHLCO2-10
      - DHLCO2-11
      - "Offer para 43"
      - "Offer para 45"
      - "Offer para 46"
  - id: ASM-003
    topic: Canonical storage
    statement: Repo is SSOT, Vault receives promoted summaries, Jira mirrors status.
    source_refs:
      - user_decision

gaps:
  - id: GAP-001
    title: Carbon intensity provider — phased integration model defined
    description: >
      Phase 1 uses national average grid intensity (e.g. UBA Germany).
      Phase 2 targets IEA/EMBER (quarterly, national/regional).
      Target state: Electricity Maps API (hourly, regional real-time).
    impact: Phase 1 calculations use documented simplified values; precision increases with each integration step.
    required_input: Standort-/Regionsinformationen des Auftraggebers für Phase-2-Integration.
    status: addressed
    decision_date: "2026-03-26"
    source_refs:
      - DHLCO2-4
      - DHLCO2-11
  - id: GAP-002
    title: Functional unit R2 — decided (service request)
    description: >
      R2 = 1 service request (R2a) as Phase 1 reference functional unit.
      Extension path defined: Phase 2 → business transaction (R2b),
      implementation phase → shipment-based (R2c) once operative data is available.
      Framework treats R as exchangeable parameter; calculation logic remains identical.
    impact: Run KPI denominators are now methodically defined; operative data binding is subject of implementation phase.
    required_input: Stakeholder alignment on monitoring system for request counting (Phase 2).
    status: addressed
    decision_date: "2026-03-26"
    source_refs:
      - DHLCO2-8
      - DHLCO2-11
  - id: GAP-003
    title: Embodied carbon amortization method — method defined, inventory sourcing open
    description: >
      Amortization method resolved in Phase 2 (linear, inventory-fed).
      Formula: EmbodiedCO2_per_request = EmbodiedCO2_hardware_kg * 1000 / (LifetimeMonths * RequestsPerMonth).
      Annualized: EmbodiedCO2_ann_gCO2e = EmbodiedCO2_hardware_kg * 1000 / LifetimeYears.
      Inventory source priority: (1) vendor PCF datasheet (e.g. NVIDIA PCF) > (2) Ecoinvent database >
      (3) generic proxy: 0.5 kg CO2e/W TDP (uncertainty ±50%).
      Multi-GPU clusters: sum over all nodes, η_parallel correction applied to LifetimeOutputs.
    impact: BLD-004, BLD-005, HW-001 can progress past candidate state once inventory source is confirmed.
    required_input: Confirm hardware inventory source (PCF datasheet preferred) per pilot infrastructure.
    status: addressed_phase2
    decision_date: "2026-05-29"
    source_refs:
      - DHLCO2-4
      - DHLCO2-10
      - phase2_rdc_gap_analysis
  - id: GAP-004
    title: Data ownership and source systems undefined
    description: Data owners and authoritative systems are missing for KPI ingestion.
    impact: No deterministic production pipeline can be connected.
    required_input: Assign owner and system per KPI candidate (requires stakeholder input).
    status: open_phase2
    source_refs:
      - DHLCO2-6
      - DHLCO2-10
      - DHLCO2-11
  - id: GAP-005
    title: ISO reference mapping incomplete
    description: KPI-level ISO references are marked TBD in ticket drafts.
    impact: Normative traceability is incomplete.
    required_input: Complete mapping to agreed standards per KPI.
    status: open_phase2
    source_refs:
      - DHLCO2-6
      - DHLCO2-7
      - "Offer para 62"

proxies:
  - id: PRX-001
    gap_id: GAP-001
    proxy: Use region-level average grid intensity feed until source is fixed.
    quality: low
    source_refs:
      - DHLCO2-11
  - id: PRX-002
    gap_id: GAP-002
    proxy: Use request count as temporary denominator for RUN-001 to RUN-004.
    quality: low
    source_refs:
      - DHLCO2-8
      - DHLCO2-11
  - id: PRX-003
    gap_id: GAP-003
    proxy: >
      Linear amortization over fixed service life with inventory-fed embodied CO2 input.
      Formula: EmbodiedCO2_per_request = EmbodiedCO2_kg * 1000 / (LifetimeMonths * RequestsPerMonth).
      Fallback when no vendor PCF available: 0.5 kg CO2e/W TDP (uncertainty ±50%).
    quality: medium
    source_refs:
      - DHLCO2-4
      - DHLCO2-10
      - phase2_rdc_gap_analysis
  - id: PRX-004
    gap_id: GAP-004
    proxy: Use ticket assignee as temporary owner until RACI is defined.
    quality: low
    source_refs:
      - DHLCO2-6
