# KPI-to-Process-Mapping — machine-readable counterpart to docs/phase2_kpi_to_process_mapping.md
#
# PURPOSE: Phase-2 deliverable D2-03. Binds each of the 19 KPI candidates to a process
# anchor, a Green-Gate decision location, an owner role, and the concrete decision the
# role takes at that point. Complements data/lifecycle_mapping.yaml (which maps KPIs to
# the 8 generic lifecycle steps) by adding the governance/decision layer on top.
#
# Source: docs/phase2_kpi_to_process_mapping.md (prose version, same content).
# ID schema: MAP-P-001 .. MAP-P-019 (P = process, distinct from MAP-001..019 in lifecycle_mapping.yaml)

kpi_process_mappings:
